{% extends "base.html" %}

{% block content %}
<div class="hero">
    <h1>Add New Product</h1>
    <p>Fill in the form below to add a new product to the inventory.</p>

    <form method="POST" class="form-card">
        <label>Product Name</label>
        <input type="text" name="name" placeholder="Example: Respirator KZ-200" required>

        <label>Category</label>
        <input type="text" name="category" placeholder="Example: PPE / Gloves / Filters" required>

        <label>Quantity</label>
        <input type="number" name="quantity" placeholder="Example: 100" required>

        <label>Minimum Threshold</label>
        <input type="number" name="threshold" placeholder="Example: 20" required>

        <label>Price</label>
        <input type="number" step="0.01" name="price" placeholder="Example: 1500" required>

        <label>Barcode</label>
        <input type="text" name="barcode" placeholder="Example: 123456789">

        <button type="submit" class="btn">Add Product</button>
    </form>
</div>
{% endblock %}
